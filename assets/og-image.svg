<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#ff7a1a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>

  <!-- game controller -->
  <g transform="translate(600,410)">
    <rect x="-190" y="-70" width="380" height="150" rx="70" fill="#ffffff"/>
    <rect x="-235" y="10" width="90" height="90" rx="20" fill="#ffffff"/>
    <rect x="145" y="10" width="90" height="90" rx="20" fill="#ffffff"/>
    <rect x="-150" y="-25" width="16" height="60" rx="6" fill="#0a0a0a"/>
    <rect x="-180" y="5" width="76" height="16" rx="6" fill="#0a0a0a"/>
    <circle cx="95" cy="-10" r="16" fill="#ff7a1a"/>
    <circle cx="130" cy="15" r="16" fill="#ff7a1a"/>
    <circle cx="60" cy="15" r="16" fill="#ff7a1a"/>
    <circle cx="95" cy="40" r="16" fill="#ff7a1a"/>
  </g>

  <text x="600" y="680" font-size="82" fill="#ffffff" text-anchor="middle" font-family="-apple-system, Arial, sans-serif" font-weight="800">oyun<tspan fill="#ff7a1a">hilekodları</tspan></text>
  <text x="600" y="760" font-size="38" fill="#f0d8c0" text-anchor="middle" font-family="-apple-system, Arial, sans-serif" font-weight="600">Tüm Oyunlar İçin Cheat Kodları</text>
</svg>
